<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB 학습자상 알아보기</title>
  <style>
    :root {
      --white: #fff;
      --ink: #171719;
      --text: rgba(37, 38, 41, .78);
      --muted: rgba(55, 56, 60, .55);
      --line: rgba(112, 115, 124, .22);
      --bg: #f7f7f8;
      --blue: #0066ff;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(112,115,124,.07);
      --shadow-strong: 0 10px 28px rgba(0,0,0,.14), 0 2px 6px rgba(0,0,0,.06);
      font-family: "Pretendard", "Apple SD Gothic Neo", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body { -webkit-font-smoothing: antialiased; }
    button, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 12px 20px; background: var(--white); border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center;
      color: #fff; background: var(--blue); box-shadow: var(--shadow-strong);
    }
    .brand-title { display: block; color: var(--ink); font-size: 16px; font-weight: 800; line-height: 1.2; }
    .brand-sub { display: block; color: var(--muted); font-size: 12px; font-weight: 650; line-height: 1.25; }

    .tabs { display: flex; gap: 4px; padding: 4px; border-radius: 999px; background: var(--bg); }
    .tab {
      display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 999px;
      background: transparent; color: var(--muted); font-size: 14px; font-weight: 750;
    }
    .tab:hover { background: rgba(112,115,124,.08); color: var(--text); }
    .tab.active { background: var(--white); color: #005eeb; box-shadow: var(--shadow); }
    .tab-n {
      width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center;
      background: rgba(112,115,124,.16); color: var(--muted); font-size: 12px;
    }
    .tab.active .tab-n { background: var(--blue); color: #fff; }

    main { flex: 1; }
    .screen { max-width: 1180px; margin: 0 auto; padding: 32px 24px 64px; animation: rise .25s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .head { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
    .step {
      display: inline-block; margin-bottom: 8px; padding: 4px 10px; border-radius: 999px;
      background: #eaf2fe; color: var(--blue); font-size: 12px; font-weight: 850;
    }
    h1, h2, h3, p { margin-top: 0; }
    .head h1 { margin-bottom: 6px; color: var(--ink); font-size: 26px; letter-spacing: 0; }
    .head p { margin-bottom: 0; color: var(--muted); font-size: 14px; }

    .progress { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .ring {
      --pct: 0;
      width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center;
      background: conic-gradient(var(--blue) calc(var(--pct) * 1%), #e1e2e4 0);
    }
    .ring span {
      width: 50px; height: 50px; border-radius: 50%; display: grid; place-items: center;
      background: var(--white); color: var(--ink); font-size: 18px; font-weight: 850;
    }
    .ring i { color: var(--muted); font-size: 11px; font-style: normal; }
    .progress-label, .tally-label { color: var(--muted); font-size: 11px; font-weight: 750; }

    .tabs.is-disabled { display: none; }
    .seat-layout { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr); gap: 20px; align-items: start; }
    .seat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    .seat {
      min-height: 74px; border: 1px solid var(--line); border-radius: 14px; background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      color: var(--ink); font-weight: 900; box-shadow: var(--shadow);
    }
    .seat:hover, .seat.selected { border-color: var(--blue); box-shadow: inset 0 0 0 2px var(--blue), var(--shadow); }
    .seat small { min-height: 16px; color: var(--muted); font-size: 11px; font-weight: 750; }
    .seat.selected small { color: #005eeb; }
    .seat-form { display: flex; flex-direction: column; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { color: var(--ink); font-size: 13px; font-weight: 850; }
    input[type="text"], input[type="number"] {
      width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
      background: #fff; color: var(--ink); font-weight: 750; outline: none;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px #eaf2fe; }
    .student-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; background: #eaf2fe; color: #0054d1; font-size: 12px; font-weight: 850; }
    .setup-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .notice {
      display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-radius: 14px;
      background: #f7fbff; color: #0054d1; border: 1px solid #c9defe; font-size: 14px; font-weight: 750;
    }
    .teams { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
    .team-card { border: 1px solid var(--line); border-radius: 14px; background: #fff; padding: 14px; }
    .team-title { display: flex; justify-content: space-between; align-items: center; color: var(--ink); font-weight: 900; margin-bottom: 10px; }
    .team-members { display: flex; flex-wrap: wrap; gap: 6px; }
    .member-pill { padding: 5px 9px; border-radius: 999px; background: var(--soft); color: var(--deep); font-size: 12px; font-weight: 850; }
    .member-pill.me { background: var(--accent); color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .card {
      position: relative; min-height: 178px; display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
      padding: 20px; border: 1px solid var(--line); border-radius: 18px; background: var(--white); text-align: left;
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-strong); }
    .card.answered { border-color: transparent; box-shadow: inset 0 0 0 2px var(--accent); background: var(--soft); }
    .card-icon {
      width: 48px; height: 48px; border-radius: 12px; display: grid; place-items: center; margin-bottom: 6px;
      background: var(--soft); color: var(--accent);
    }
    .card.answered .card-icon { background: #fff; }
    .ko { color: var(--ink); font-size: 16px; font-weight: 850; }
    .en { color: rgba(55,56,60,.35); font-size: 11px; font-weight: 850; text-transform: uppercase; }
    .cta { margin-top: auto; display: inline-flex; align-items: center; gap: 5px; color: var(--accent); font-size: 12px; font-weight: 850; }
    .check {
      position: absolute; top: 12px; right: 12px; width: 24px; height: 24px; border-radius: 50%;
      display: grid; place-items: center; background: var(--accent); color: #fff; box-shadow: var(--shadow);
    }

    .modal-back {
      position: fixed; inset: 0; z-index: 40; display: grid; place-items: center;
      padding: 20px; background: rgba(23,23,25,.52);
    }
    .modal {
      width: min(100%, 460px); overflow: hidden; position: relative; border-radius: 28px;
      background: var(--white); box-shadow: 0 12px 36px rgba(0,0,0,.18);
    }
    .modal-x {
      position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 50%;
      display: grid; place-items: center; background: rgba(255,255,255,.7); color: var(--muted);
    }
    .modal-head { display: flex; gap: 16px; align-items: center; padding: 24px; background: var(--soft); }
    .modal-icon {
      flex: 0 0 auto; width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
      background: #fff; color: var(--accent); box-shadow: var(--shadow);
    }
    .modal-en { display: block; color: var(--deep); font-size: 11px; font-weight: 850; text-transform: uppercase; }
    .modal-title { margin: 2px 0 0; color: var(--ink); font-size: 19px; line-height: 1.35; }
    .modal-body { padding: 20px 24px 8px; }
    textarea {
      width: 100%; min-height: 120px; resize: vertical; padding: 16px; border-radius: 12px;
      border: 1px solid var(--line); outline: none; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6;
    }
    textarea:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px #eaf2fe; }
    .meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 10px; }
    .hint, .count { color: var(--muted); font-size: 12px; font-weight: 650; }
    .actions { display: flex; gap: 10px; padding: 16px 24px 24px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: 10px; font-size: 15px; font-weight: 850; background: rgba(112,115,124,.08); color: var(--text);
    }
    .btn:hover { filter: brightness(1.04); }
    .btn.primary { background: var(--accent, var(--blue)); color: #fff; }
    .btn:disabled { background: #f4f4f5 !important; color: rgba(55,56,60,.25); cursor: not-allowed; filter: none; }
    .actions .btn { flex: 1; }
    .actions .ghost { flex: 0 0 auto; }

    .lens { display: flex; flex-direction: column; gap: 4px; }
    .lens label { color: var(--muted); font-size: 11px; font-weight: 750; }
    select { min-width: 180px; padding: 10px 16px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); font-weight: 800; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .panel {
      border: 1px solid var(--line); border-radius: 22px; padding: 20px; background: #fff;
    }
    .panel-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .panel-title { display: inline-flex; align-items: center; gap: 7px; color: var(--ink); font-size: 15px; font-weight: 850; }
    .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; background: var(--soft); color: var(--deep); font-size: 12px; font-weight: 850; }
    .postits { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .postit {
      position: relative; min-height: 116px; display: flex; flex-direction: column; gap: 8px;
      padding: 16px 12px 12px; border-radius: 8px; background: var(--soft); box-shadow: var(--shadow);
    }
    .pin { position: absolute; top: 8px; left: 50%; width: 8px; height: 8px; border-radius: 50%; transform: translateX(-50%); background: var(--accent); }
    .postit p { flex: 1; margin: 6px 0 0; color: #292a2d; font-size: 13px; font-weight: 650; line-height: 1.5; }
    .avatar { width: 20px; height: 20px; border-radius: 50%; display: inline-grid; place-items: center; margin-right: 6px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 850; }
    .name { color: #46474c; font-size: 12px; font-weight: 850; }
    .compose-frame { padding: 16px; border: 2px dashed var(--accent); border-radius: 16px; background: #fff; }
    .prefix { display: block; margin-bottom: 8px; color: var(--deep); font-size: 14px; font-weight: 850; }
    .compose-frame textarea { min-height: 126px; padding: 0; border: 0; background: transparent; box-shadow: none; }
    .lead { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .block { width: 100%; margin-top: 16px; }
    .submitted { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; padding: 8px 4px 4px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 999px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 850; }
    .def { color: var(--ink); font-size: 19px; line-height: 1.55; font-weight: 850; }
    .submitted-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; padding-top: 16px; border-top: 1px solid var(--line); }
    .small { padding: 8px 12px; border-radius: 8px; font-size: 13px; }

    .tally { text-align: center; }
    .tally-num { display: block; color: #005eeb; font-size: 28px; line-height: 1; font-weight: 900; }
    .tally-num i { color: rgba(55,56,60,.3); font-size: 15px; font-style: normal; }
    .declare {
      position: relative; overflow: hidden; margin-bottom: 32px; padding: 40px; border-radius: 28px; background: #171719; color: #fff;
    }
    .declare::after {
      content: ""; position: absolute; top: -120px; right: -80px; width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, #0066ff 0%, transparent 70%); opacity: .35;
    }
    .declare-inner { position: relative; z-index: 1; }
    .declare-label { display: inline-flex; gap: 6px; margin-bottom: 12px; color: #9ec5ff; font-size: 12px; font-weight: 850; }
    .declare-title { display: block; margin-bottom: 12px; color: rgba(255,255,255,.55); font-size: 13px; font-weight: 750; }
    blockquote { margin: 0; max-width: 900px; color: #fff; font-size: 30px; line-height: 1.5; font-weight: 900; }
    .quote-mark { color: #69a5ff; }
    .declare .btn { margin-top: 20px; background: rgba(255,255,255,.12); color: #fff; }
    .declare textarea { min-height: 120px; background: rgba(255,255,255,.95); color: #171719; font-size: 22px; font-weight: 850; }
    .edit-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 12px; }
    .gallery-bar { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .gallery-hint { color: var(--muted); font-size: 12px; }
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .gcard { overflow: hidden; display: flex; flex-direction: column; min-height: 210px; border: 1.5px solid var(--line); border-radius: 18px; background: #fff; }
    .gcard.mine { border-color: var(--accent); }
    .gcard-top { position: relative; display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: var(--soft); }
    .gno { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--accent); color: #fff; font-weight: 900; }
    .gname { display: block; color: var(--deep); font-size: 14px; font-weight: 850; }
    .members { color: var(--muted); font-size: 11px; font-weight: 750; }
    .mine-label { position: absolute; top: 10px; right: 12px; padding: 3px 8px; border-radius: 999px; background: #292a2d; color: #fff; font-size: 10px; font-weight: 850; }
    .gbody { flex: 1; display: flex; padding: 16px; }
    .gbody p { margin: 0; color: var(--text); font-size: 14px; font-weight: 650; line-height: 1.6; }
    .empty { display: flex; align-items: center; gap: 8px; color: rgba(55,56,60,.35); font-size: 13px; font-weight: 750; }
    .spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #dbdcdf; border-top-color: #989ba2; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    svg { flex: 0 0 auto; }
    @media (max-width: 960px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 860px) { .split, .seat-layout { grid-template-columns: 1fr; } .gallery { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 680px) {
      .topbar { justify-content: center; }
      .tabs { width: 100%; justify-content: space-between; }
      .tab { flex: 1; justify-content: center; padding: 8px 10px; }
      .tab-label { display: none; }
      .screen { padding: 20px 16px 48px; }
      .head h1 { font-size: 22px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .postits, .gallery, .teams { grid-template-columns: 1fr; }
      .seat-grid { grid-template-columns: repeat(3, 1fr); }
      .setup-grid { grid-template-columns: 1fr; }
      .declare { padding: 24px; }
      blockquote { font-size: 22px; }
      .gallery-bar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" data-icon="sparkles"></div>
        <div>
          <span class="brand-title">IB 학습자상 알아보기</span>
        </div>
      </div>
      <nav class="tabs" aria-label="활동 단계">
        <button class="tab active" data-tab="personal"><span class="tab-n">1</span><span class="tab-label">개인 활동</span></button>
        <button class="tab" data-tab="group"><span class="tab-n">2</span><span class="tab-label">모둠 활동</span></button>
        <button class="tab" data-tab="class"><span class="tab-n">3</span><span class="tab-label">반 전체</span></button>
        <button class="tab" data-tab="self"><span class="tab-n">4</span><span class="tab-label">자기 평가</span></button>
      </nav>
    </header>
    <main id="main"></main>
  </div>
  <div id="modal-root"></div>

  <script>
    const icons = {
      sparkles: '<path d="M9.9 14.7 9 19l-.9-4.3a3 3 0 0 0-2.7-2.7L1 11l4.3-.9a3 3 0 0 0 2.7-2.7L9 3l.9 4.3a3 3 0 0 0 2.7 2.7L17 11l-4.3.9a3 3 0 0 0-2.8 2.8z"/><path d="M18 16.5 18.5 19l.5-2.5L21.5 16 19 15.5 18.5 13 18 15.5 15.5 16z"/>',
      compass: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
      book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
      lightbulb: '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
      message: '<path d="M21 11.5a8.5 8.5 0 0 1-11.3 8L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/>',
      scale: '<path d="M12 3v18"/><path d="M5 7h14"/><path d="m5 7-3 6h6Z"/><path d="m19 7-3 6h6Z"/><path d="M7 21h10"/>',
      globe: '<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/>',
      heart: '<path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 5 5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.1 3 5.5l7 7Z"/>',
      mountain: '<path d="m8 3 4 8 5-5 5 15H2L8 3z"/>',
      activity: '<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
      reflect: '<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2m-15.7 5.7-1.4 1.4m14.2-14.2-1.4 1.4m0 11.4 1.4 1.4M4.9 4.9l1.4 1.4"/>',
      check: '<polyline points="20 6 9 17 4 12"/>',
      pencil: '<path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
      plus: '<path d="M5 12h14M12 5v14"/>',
      close: '<path d="M18 6 6 18M6 6l12 12"/>',
      users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/>',
      quote: '<path d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2.5a.5.5 0 0 1 .5.5v.5a2 2 0 0 1-2 2 1 1 0 0 0 0 2 4 4 0 0 0 4-4V5a2 2 0 0 0-2-2z"/><path d="M6 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2.5a.5.5 0 0 1 .5.5v.5a2 2 0 0 1-2 2 1 1 0 0 0 0 2 4 4 0 0 0 4-4V5a2 2 0 0 0-2-2z"/>',
      send: '<path d="M14.5 21.7a.5.5 0 0 0 .9 0l6.5-19a.5.5 0 0 0-.6-.7l-19 6.5a.5.5 0 0 0 0 .9l7.9 3.2a2 2 0 0 1 1.1 1.1z"/><path d="m21.9 2.1-11 11"/>',
      grid: '<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>',
      star: '<path d="m12 2 3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21 7 14.2 2 9.3l6.9-1Z"/>'
    };

    const ramps = {
      blue: ["#eaf2fe", "#f7fbff", "#0066ff", "#003e9c"],
      violet: ["#f0ecfe", "#fbfaff", "#6541f2", "#3a16c9"],
      purple: ["#f9edff", "#fefbff", "#cb59ff", "#861cb8"],
      cyan: ["#defaff", "#f7feff", "#00bdde", "#006f82"],
      green: ["#d9ffe6", "#f2fff6", "#00bf40", "#006e25"],
      lightBlue: ["#e5f6fe", "#f7fdff", "#00aeff", "#006796"],

    function icon(name, size = 20, fill = "none") {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${icons[name]}</svg>`;
    }
    function styleVars(color) {
      const [soft, pale, accent, deep] = ramps[color];
      return `--soft:${soft};--pale:${pale};--accent:${accent};--deep:${deep}`;
    }
    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    const STORAGE_KEY = "ib-learner-profile-explorer-v2";

    function emptyStudentData() {
      return {
        answers: {},
        groupProfileId: "caring",
        groupDef: "",
        groupSubmitted: false,
        classProfileId: "caring",
        classMeanings: {},
        selfScores: {}
      };
    }

    function loadStore() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        state.roster = saved.roster || {};
        state.groupCount = saved.groupCount || state.groupCount;
        state.groupSize = saved.groupSize || state.groupSize;
        state.groupAssignments = saved.groupAssignments || [];
      } catch {
        state.roster = {};
      }
    }

    function saveStore() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        roster: state.roster,
        groupCount: state.groupCount,
        groupSize: state.groupSize,
        groupAssignments: state.groupAssignments
      }));
    }

    function loadStudent(seat) {
      const record = state.roster[seat] || { name: "", data: emptyStudentData() };
      const data = { ...emptyStudentData(), ...(record.data || {}) };
      state.currentSeat = seat;
      state.currentName = record.name || "";
      state.answers = data.answers || {};
      state.groupProfileId = data.groupProfileId || "caring";
      state.groupDef = data.groupDef || "";
      state.groupSubmitted = Boolean(data.groupSubmitted);
      state.classProfileId = data.classProfileId || "caring";
      state.classMeanings = data.classMeanings || {};
      state.selfScores = data.selfScores || {};
    }

    function saveCurrentStudent() {
      if (!state.currentSeat) return;
      state.roster[state.currentSeat] = {
        name: state.currentName,
        data: {
          answers: state.answers,
          groupProfileId: state.groupProfileId,
          groupDef: state.groupDef,
          groupSubmitted: state.groupSubmitted,
          classProfileId: state.classProfileId,
          classMeanings: state.classMeanings,
          selfScores: state.selfScores
        }
      };
      saveStore();
    }

    function registeredStudents() {
      return Object.entries(state.roster)
        .filter(([, record]) => record && record.name)
        .map(([seat, record]) => ({ seat: Number(seat), name: record.name }))
        .sort((a, b) => a.seat - b.seat);
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

      document.querySelectorAll(".tab").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === state.tab));

      if (state.tab === "group") renderGroup();
      if (state.tab === "class") renderClass();
      if (state.tab === "self") renderSelf();
      hydrateIcons();

    function shortLabel(ko) {
      return ko
        .replace("을 지키는 사람", "").replace("을 가진 사람", "")
        .replace("잡힌 사람", "").replace("이 많은 사람", "").replace("하는 사람", "")

    function classAvgScores() {
      const entries = Object.values(state.roster).filter(r => r?.name && r?.data?.selfScores && Object.keys(r.data.selfScores).length);
      if (!entries.length) return {};
      const sums = {}, counts = {};
      entries.forEach(r => {
        profiles.forEach(p => {
          const v = r.data.selfScores[p.id];
          if (v) { sums[p.id] = (sums[p.id] || 0) + v; counts[p.id] = (counts[p.id] || 0) + 1; }
        });
      });
      const avgs = {};
      profiles.forEach(p => { avgs[p.id] = counts[p.id] ? +(sums[p.id] / counts[p.id]).toFixed(1) : 0; });
      return avgs;
    }

    function radarChart(myScores, avgScores) {
      const W = 300, H = 300, cx = 150, cy = 150, R = 100, n = profiles.length;
      const startAngle = -Math.PI / 2;
      function ptOf(idx, score) {
        const a = startAngle + (idx / n) * 2 * Math.PI;
        const r = (score / 10) * R;
        return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
      }
      function polyPath(scores) {
        return profiles.map((p, i) => {
          const [x, y] = ptOf(i, scores[p.id] || 0);
          return `${i ? "L" : "M"}${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ") + " Z";
      }
      const gridPaths = [2, 4, 6, 8, 10].map(lv => {
        const d = profiles.map((_, i) => {
          const [x, y] = ptOf(i, lv);
          return `${i ? "L" : "M"}${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ") + " Z";
        return { d, lv };
      });
      const axes = profiles.map((_, i) => {
        const [x, y] = ptOf(i, 10);
        return `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(112,115,124,.14)" stroke-width="1"/>`;
      });
      const labelR = R + 22;
      const labels = profiles.map((p, i) => {
        const a = startAngle + (i / n) * 2 * Math.PI;
        const lx = cx + labelR * Math.cos(a), ly = cy + labelR * Math.sin(a);
        const anchor = lx < cx - 4 ? "end" : lx > cx + 4 ? "start" : "middle";
        return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="10" font-weight="800" fill="rgba(37,38,41,.78)">${esc(shortLabel(p.ko))}</text>`;
      });
      const levelLabels = [2, 4, 6, 8, 10].map(lv => {
        const [lx, ly] = ptOf(0, lv);
        return `<text x="${(lx + 3).toFixed(1)}" y="${(ly - 2).toFixed(1)}" text-anchor="start" dominant-baseline="auto" font-size="9" fill="rgba(112,115,124,.5)" font-weight="700">${lv}</text>`;
      });
      const hasMyData = profiles.some(p => myScores[p.id]);
      const hasAvgData = profiles.some(p => avgScores[p.id]);
      const myPath = polyPath(myScores);
      const avgPath = polyPath(avgScores);
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">
        ${gridPaths.map(({ d, lv }) => `<path d="${d}" fill="none" stroke="rgba(112,115,124,.${lv === 10 ? "18" : "1"})" stroke-width="${lv === 10 ? 1.5 : 1}"/>`).join("")}
        ${axes.join("")}
        ${hasAvgData ? `<path d="${avgPath}" fill="rgba(112,115,124,.09)" stroke="rgba(112,115,124,.45)" stroke-width="1.5" stroke-dasharray="5,3"/>` : ""}
        ${hasMyData ? `<path d="${myPath}" fill="rgba(0,102,255,.14)" stroke="#0066ff" stroke-width="2.5" stroke-linejoin="round"/>` : ""}
        ${hasMyData ? profiles.map((p, i) => { const s = myScores[p.id] || 0; if (!s) return ""; const [x, y] = ptOf(i, s); return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="#0066ff" stroke="#fff" stroke-width="1.5"/>`; }).join("") : ""}
        ${labels.join("")}
        ${levelLabels.join("")}
      </svg>`;
    }

    function selfCard(p) {

            <div style="position:sticky;top:80px;display:flex;flex-direction:column;gap:16px">

                  <span class="chip">${icon("star", 13)} ${rated}/10</span>
                </div>
                <div style="display:flex;justify-content:center;padding:16px 0 8px">
                  ${radarChart(state.selfScores, avgScores)}
                </div>
                <div style="display:flex;gap:20px;justify-content:center;padding:10px 0 4px;border-top:1px solid var(--line);flex-wrap:wrap">
                  <span style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--ink)">
                    <svg width="20" height="3" viewBox="0 0 20 3" style="flex:0 0 auto"><rect width="20" height="3" rx="1.5" fill="#0066ff"/></svg>나의 능력치
                  </span>
                  <span style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--muted)">
                    <svg width="20" height="3" viewBox="0 0 20 3" style="flex:0 0 auto"><line x1="0" y1="1.5" x2="20" y2="1.5" stroke="rgba(112,115,124,.5)" stroke-width="1.5" stroke-dasharray="5,3"/></svg>학급 평균
                  </span>
                </div>
              </section>
            </div>
          </div>
        </section>`;
      document.querySelectorAll("[data-score-btn]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.selfScores[btn.dataset.profileId] = Number(btn.dataset.score);
          saveCurrentStudent();
          renderSelf();
        });
      });
    }

    function hydrateIcons() {
      document.querySelectorAll("[data-icon]").forEach(el => { el.innerHTML = icon(el.dataset.icon, 18); });
    }

    document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); }));
    hydrateIcons();
    render();
  </script>
</body>
</html>
