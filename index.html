<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IB 학습자상 알아보기</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    :root {
      --white:#fff;--ink:#171719;--text:rgba(37,38,41,.78);--muted:rgba(55,56,60,.55);
      --line:rgba(112,115,124,.22);--bg:#f7f7f8;--blue:#0066ff;
      --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(112,115,124,.07);
      --shadow-strong:0 10px 28px rgba(0,0,0,.14),0 2px 6px rgba(0,0,0,.06);
      font-family:"Pretendard","Apple SD Gothic Neo",system-ui,-apple-system,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    body{display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
    .card{background:#fff;border-radius:24px;box-shadow:var(--shadow-strong);padding:40px;width:100%;max-width:460px}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .logo-mark{width:46px;height:46px;border-radius:14px;background:var(--blue);display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-strong);flex:0 0 auto}
    .logo-title{color:var(--ink);font-size:17px;font-weight:800;line-height:1.25}
    .logo-sub{color:var(--muted);font-size:12px;font-weight:600;margin-top:2px}
    h2{color:var(--ink);font-size:22px;font-weight:800;margin-bottom:6px}
    .desc{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:28px}
    .field{margin-bottom:16px}
    label{display:block;color:var(--ink);font-size:13px;font-weight:700;margin-bottom:6px}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font:inherit;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
    input:focus{border-color:var(--blue);box-shadow:0 0 0 3px #eaf2fe}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn-primary{display:block;width:100%;padding:14px;border:0;border-radius:12px;background:var(--blue);color:#fff;font:inherit;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(0,102,255,.3);transition:opacity .15s,transform .1s;margin-top:8px;text-align:center}
    .btn-primary:hover{opacity:.92}
    .btn-primary:active{transform:scale(.98)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-secondary{display:block;width:100%;padding:12px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:10px;text-align:center}
    .btn-secondary:hover{background:var(--bg)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:#d9ffe6;color:#006e25;font-size:12px;font-weight:750;margin-bottom:16px}
    .info-row{display:flex;gap:12px;align-items:center;margin:6px 0 16px;font-size:13px;color:var(--muted)}
    .info-row b{color:var(--ink)}
    .qr-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin:20px 0 16px}
    .qr-wrap canvas{border-radius:12px;box-shadow:var(--shadow)}
    .url-box{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);word-break:break-all;line-height:1.5}
    .divider{height:1px;background:var(--line);margin:20px 0}
    .spin-wrap{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px 0;color:var(--muted);font-size:14px}
    .spin{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--blue);animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .recent-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .recent-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;transition:border-color .15s,background .15s}
    .recent-item:hover{border-color:var(--blue);background:#f7fbff}
    .recent-name{font-size:14px;font-weight:800;color:var(--ink)}
    .recent-meta{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
    .recent-arrow{color:var(--muted);font-size:18px;flex:0 0 auto}
    .recent-del{display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:transparent;border:0;color:var(--muted);font-size:16px;cursor:pointer;flex:0 0 auto;transition:background .15s,color .15s}
    .recent-del:hover{background:#fee2e2;color:#c0152a}
    .section-title{font-size:12px;font-weight:750;color:var(--muted);margin-bottom:8px;margin-top:24px}
    @media(max-width:500px){.card{padding:28px 20px}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="card" id="app"></div>
  <script>
    const SB_URL = 'https://nykefhqormkhmqebvpzo.supabase.co';
    const SB_KEY = 'sb_publishable_Ro8qHUtEjxqfNNObWb4quw_yV1-8KLO';
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);

    function esc(t) { return String(t ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }

    function getBase() {
      const p = window.location.pathname;
      return window.location.origin + p.substring(0, p.lastIndexOf('/') + 1);
    }

    const sparkSvg = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 14.7 9 19l-.9-4.3a3 3 0 0 0-2.7-2.7L1 11l4.3-.9a3 3 0 0 0 2.7-2.7L9 3l.9 4.3a3 3 0 0 0 2.7 2.7L17 11l-4.3.9a3 3 0 0 0-2.8 2.8z"/><path d="M18 16.5 18.5 19l.5-2.5L21.5 16 19 15.5 18.5 13 18 15.5 15.5 16z"/></svg>`;
    const checkSvg = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const logoHtml = `<div class="logo"><div class="logo-mark">${sparkSvg}</div><div><div class="logo-title">IB 학습자상 알아보기</div><div class="logo-sub">실시간 학급 활동 플랫폼</div></div></div>`;

    const RECENT_KEY = 'ib_recent_classrooms';

    function saveRecent(cls) {
      const list = getRecent().filter(c => c.id !== cls.id);
      list.unshift({ id: cls.id, name: cls.name, student_count: cls.student_count, group_count: cls.group_count, created_at: cls.created_at });
      localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, 5)));
    }

    function getRecent() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch { return []; }
    }

    function deleteRecent(id) {
      const list = getRecent().filter(c => c.id !== id);
      localStorage.setItem(RECENT_KEY, JSON.stringify(list));
      renderForm();
    }

    function renderForm() {
      const recent = getRecent();
      document.getElementById('app').innerHTML = `
        ${logoHtml}
        <h2>새 학급 만들기</h2>
        <p class="desc">학급 정보를 입력하면 학생들이 QR코드로 접속할 수 있는 활동 공간이 만들어집니다.</p>
        <div class="field"><label for="cls-name">학급 이름</label><input id="cls-name" type="text" placeholder="예: 5학년 3반" maxlength="30"></div>
        <div class="row">
          <div class="field"><label for="stu-cnt">학생 수</label><input id="stu-cnt" type="number" min="2" max="50" placeholder="예: 25"></div>
          <div class="field"><label for="grp-cnt">모둠 수</label><input id="grp-cnt" type="number" min="2" max="10" placeholder="예: 5"></div>
        </div>
        <button class="btn-primary" id="create-btn" disabled>학급 만들기</button>
        ${recent.length ? `
          <div class="section-title">최근 만든 학급</div>
          <div class="recent-list">
            ${recent.map(c => `
              <div class="recent-item" data-cls='${JSON.stringify(c)}' data-id="${c.id}">
                <div style="flex:1;min-width:0">
                  <div class="recent-name">${esc(c.name)}</div>
                  <div class="recent-meta">학생 ${c.student_count}명 · 모둠 ${c.group_count}개</div>
                </div>
                <span class="recent-arrow">›</span>
                <button class="recent-del" data-del-id="${c.id}" title="목록에서 삭제">✕</button>
              </div>`).join('')}
          </div>` : ''}
      `;
      const nameIn = document.getElementById('cls-name');
      const stuIn = document.getElementById('stu-cnt');
      const grpIn = document.getElementById('grp-cnt');
      const btn = document.getElementById('create-btn');
      const validate = () => { btn.disabled = !(nameIn.value.trim() && +stuIn.value >= 2 && +grpIn.value >= 2); };
      nameIn.addEventListener('input', validate);
      stuIn.addEventListener('input', () => {
        const n = parseInt(stuIn.value) || 0;
        if (n >= 2 && !grpIn.value) grpIn.value = Math.max(2, Math.round(n / 5));
        validate();
      });
      grpIn.addEventListener('input', validate);
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = '만드는 중...';
        const { data, error } = await sb.from('classrooms').insert({
          name: nameIn.value.trim(),
          student_count: parseInt(stuIn.value),
          group_count: parseInt(grpIn.value)
        }).select().single();
        if (error) { alert('오류: ' + error.message); btn.disabled = false; btn.textContent = '학급 만들기'; return; }
        saveRecent(data);
        renderResult(data);
      });
      document.querySelectorAll('.recent-del').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deleteRecent(btn.dataset.delId);
        });
      });
      document.querySelectorAll('.recent-item').forEach(el => {
        el.addEventListener('click', () => {
          const cls = JSON.parse(el.dataset.cls);
          renderResult(cls);
        });
      });
      nameIn.focus();
    }

    function renderResult(cls) {
      const base = getBase();
      const studentUrl = `${base}student.html?classroom=${cls.id}`;
      const teacherUrl = `${base}teacher.html?classroom=${cls.id}`;
      document.getElementById('app').innerHTML = `
        ${logoHtml}
        <div class="badge">${checkSvg} 학급이 생성됐습니다</div>
        <h2>${esc(cls.name)}</h2>
        <div class="info-row"><span>학생 <b>${cls.student_count}명</b></span><span>·</span><span>모둠 <b>${cls.group_count}개</b></span></div>
        <div class="qr-wrap">
          <canvas id="qr-canvas"></canvas>
          <span style="font-size:12px;color:var(--muted);font-weight:600">학생용 QR코드 · 스캔하면 바로 입장</span>
        </div>
        <div class="url-box">${esc(studentUrl)}</div>
        <div class="divider"></div>
        <button class="btn-primary" id="teacher-btn">교사로 입장하기 →</button>
        <button class="btn-secondary" id="new-btn">새 학급 만들기</button>
      `;
      try {
        new QRious({ element: document.getElementById('qr-canvas'), value: studentUrl, size: 200, background: '#fff', foreground: '#171719', backgroundAlpha: 1 });
      } catch(e) { console.warn('QR 생성 오류:', e); }
      document.getElementById('teacher-btn').addEventListener('click', () => { window.location.href = teacherUrl; });
      document.getElementById('new-btn').addEventListener('click', renderForm);
    }

    renderForm();
  </script>
</body>
</html>
