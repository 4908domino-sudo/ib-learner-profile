<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교사 대시보드 · IB 학습자상</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --white:#fff;--ink:#171719;--text:rgba(37,38,41,.78);--muted:rgba(55,56,60,.55);
      --line:rgba(112,115,124,.22);--bg:#f7f7f8;--blue:#0066ff;
      --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(112,115,124,.07);
      --shadow-strong:0 10px 28px rgba(0,0,0,.14),0 2px 6px rgba(0,0,0,.06);
      font-family:"Pretendard","Apple SD Gothic Neo",system-ui,-apple-system,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    button,textarea,select{font:inherit}button{border:0;cursor:pointer}
    .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line);flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-mark{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;color:#fff;background:var(--blue);box-shadow:var(--shadow-strong)}
    .brand-title{color:var(--ink);font-size:16px;font-weight:800}
    .brand-sub{color:var(--muted);font-size:12px;font-weight:600}
    .tabs{display:flex;gap:4px;padding:4px;border-radius:999px;background:var(--bg)}
    .tab{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;background:transparent;color:var(--muted);font-size:14px;font-weight:750}
    .tab:hover{background:rgba(112,115,124,.08);color:var(--text)}
    .tab.active{background:#fff;color:#005eeb;box-shadow:var(--shadow)}
    .live-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;background:#d9ffe6;color:#006e25;font-size:12px;font-weight:750}
    .live-dot{width:7px;height:7px;border-radius:50%;background:#00bf40;animation:pulse 1.5s ease infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .screen{max-width:1440px;margin:0 auto;padding:32px 32px 64px}
    h1{color:var(--ink);font-size:24px;font-weight:800;margin-bottom:6px}
    h2{color:var(--ink);font-size:18px;font-weight:800;margin-bottom:12px}
    h3{color:var(--ink);font-size:15px;font-weight:800;margin-bottom:8px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
    .step-badge{display:inline-block;padding:4px 10px;border-radius:999px;background:#eaf2fe;color:var(--blue);font-size:12px;font-weight:850;margin-bottom:8px}
    .desc{color:var(--muted);font-size:14px;line-height:1.6}
    .panel{border:1px solid var(--line);border-radius:20px;padding:20px;background:#fff}
    .panel-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
    .panel-title{display:inline-flex;align-items:center;gap:7px;color:var(--ink);font-size:15px;font-weight:850}
    .chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--soft,#eaf2fe);color:var(--deep,#003e9c);font-size:12px;font-weight:850}
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat-card{background:#fff;border-radius:16px;padding:24px 20px;border:1px solid var(--line);text-align:center}
    .stat-num{display:block;font-size:36px;font-weight:900;color:var(--blue);line-height:1.1}
    .stat-label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-top:6px}
    .seat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
    .seat-cell{border-radius:12px;padding:10px 6px;text-align:center;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:800;color:var(--ink)}
    .seat-cell.done-p{border-color:#00bf40;background:#d9ffe6;color:#006e25}
    .seat-cell.done-g{border-color:#0066ff;background:#eaf2fe;color:#003e9c}
    .seat-cell.done-s{border-color:#cb59ff;background:#f9edff;color:#861cb8}
    .seat-cell.done-all{background:linear-gradient(135deg,#d9ffe6,#eaf2fe);border-color:#0066ff;color:#005eeb}
    .seat-cell small{display:block;font-size:10px;font-weight:700;margin-top:3px;opacity:.7}
    .legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
    .profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:24px}
    .profile-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);background:#fff;text-align:left;transition:border-color .15s,background .15s}
    .profile-btn:hover{border-color:var(--blue);background:#f7fbff}
    .profile-btn.active-p{border-color:var(--accent);background:var(--soft)}
    .profile-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--soft);color:var(--accent);flex:0 0 auto}
    .profile-name{font-size:13px;font-weight:800;color:var(--ink)}
    .profile-count{font-size:11px;color:var(--muted);font-weight:700}
    .answers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
    .answer-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
    .answer-seat{font-size:13px;font-weight:850;color:var(--blue);margin-bottom:6px}
    .answer-text{font-size:14px;line-height:1.6;color:var(--ink)}
    .group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
    .group-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
    .group-card-top{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--soft,#f7f7f8)}
    .group-no{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:var(--accent,#0066ff);color:#fff;font-weight:900;font-size:13px;flex:0 0 auto}
    .group-name{font-size:14px;font-weight:850;color:var(--deep,#003e9c)}
    .group-members{font-size:11px;color:var(--muted);font-weight:700}
    .group-body{padding:16px}
    .group-def{font-size:14px;line-height:1.6;color:var(--ink);font-weight:700}
    .group-def b{color:var(--deep,#003e9c)}
    .empty-text{color:rgba(55,56,60,.35);font-size:13px;font-style:italic}
    .meanings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    @media(min-width:1280px){
      .profile-grid{grid-template-columns:repeat(5,1fr)}
      .answers-grid{grid-template-columns:repeat(4,1fr)}
      .group-grid{grid-template-columns:repeat(3,1fr)}
      .meanings-grid{grid-template-columns:repeat(3,1fr)}
      .seat-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr))}
    }
    .meaning-card{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
    .meaning-top{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--soft)}
    .meaning-icon{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:#fff;color:var(--accent);flex:0 0 auto}
    .meaning-ko{font-size:14px;font-weight:850;color:var(--deep)}
    .meaning-body{padding:14px 16px}
    .meaning-text{font-size:14px;line-height:1.6;color:var(--ink);font-weight:650;min-height:48px}
    .meaning-edit-area{display:flex;gap:8px;margin-top:10px}
    textarea{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--line);outline:none;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;resize:vertical}
    textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px #eaf2fe}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:800;background:rgba(112,115,124,.09);color:var(--text);cursor:pointer}
    .btn:hover{filter:brightness(1.05)}
    .btn.primary{background:var(--accent,var(--blue));color:#fff}
    .btn.small{padding:6px 12px;font-size:12px;border-radius:8px}
    .select-wrap{display:flex;flex-direction:column;gap:4px}
    .select-wrap label{font-size:11px;font-weight:750;color:var(--muted)}
    select{padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font-weight:800;outline:none}
    .spinner{width:14px;height:14px;border-radius:50%;border:2px solid #dbdcdf;border-top-color:#0066ff;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    svg{flex:0 0 auto}
    @media(max-width:700px){.tabs{width:100%;justify-content:space-between}.tab{flex:1;justify-content:center;padding:8px 8px}.screen{padding:20px 16px 48px}}
  </style>
</head>
<body>
  <div style="min-height:100vh;display:flex;flex-direction:column">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" id="brand-mark"></div>
        <div>
          <span class="brand-title" id="brand-title">교사 대시보드</span>
          <span class="brand-sub" id="brand-sub">불러오는 중...</span>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-tab="overview">현황</button>
        <button class="tab" data-tab="personal">개인 활동</button>
        <button class="tab" data-tab="group">모둠 활동</button>
        <button class="tab" data-tab="class">반 전체</button>
      </nav>
      <div class="live-badge"><span class="live-dot"></span>실시간</div>
    </header>
    <main id="main" style="flex:1">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:80px 20px;color:var(--muted);font-size:14px">
        <span class="spinner"></span> 데이터를 불러오는 중...
      </div>
    </main>
  </div>
  <script>
    const SB_URL = 'https://nykefhqormkhmqebvpzo.supabase.co';
    const SB_KEY = 'sb_publishable_Ro8qHUtEjxqfNNObWb4quw_yV1-8KLO';
    const { createClient } = supabase;
    const sb = createClient(SB_URL, SB_KEY);
    const classroomId = new URLSearchParams(window.location.search).get('classroom');

    const ramps = {
      blue:["#eaf2fe","#f7fbff","#0066ff","#003e9c"],violet:["#f0ecfe","#fbfaff","#6541f2","#3a16c9"],
      purple:["#f9edff","#fefbff","#cb59ff","#861cb8"],cyan:["#defaff","#f7feff","#00bdde","#006f82"],
      green:["#d9ffe6","#f2fff6","#00bf40","#006e25"],lightBlue:["#e5f6fe","#f7fdff","#00aeff","#006796"],
      pink:["#feecfb","#fffafe","#e846cd","#a81690"],orange:["#fef4e6","#fffcf7","#ff9200","#9c5800"],
      lime:["#e6ffd4","#f8fff2","#58cf04","#347d00"],redOrange:["#feeee5","#fffaf7","#ff5e00","#943600"]
    };
    const profiles = [
      ["inquirers","탐구하는 사람","Inquirers","compass","blue"],
      ["knowledgeable","지식이 많은 사람","Knowledgeable","book","violet"],
      ["thinkers","생각하는 사람","Thinkers","lightbulb","purple"],
      ["communicators","소통하는 사람","Communicators","message","cyan"],
      ["principled","원칙을 지키는 사람","Principled","scale","green"],
      ["openminded","열린 마음을 가진 사람","Open-minded","globe","lightBlue"],
      ["caring","배려하는 사람","Caring","heart","pink"],
      ["risktakers","도전하는 사람","Risk-takers","mountain","orange"],
      ["balanced","균형 잡힌 사람","Balanced","activity","lime"],
      ["reflective","성찰하는 사람","Reflective","reflect","redOrange"]
    ].map(([id,ko,en,icon,color]) => ({id,ko,en,icon,color}));

    const groupNames = ["무지개","번개","새싹","별빛","파도","햇살","구름","달빛","바람","눈꽃"];
    const icons = {
      sparkles:'<path d="M9.9 14.7 9 19l-.9-4.3a3 3 0 0 0-2.7-2.7L1 11l4.3-.9a3 3 0 0 0 2.7-2.7L9 3l.9 4.3a3 3 0 0 0 2.7 2.7L17 11l-4.3.9a3 3 0 0 0-2.8 2.8z"/><path d="M18 16.5 18.5 19l.5-2.5L21.5 16 19 15.5 18.5 13 18 15.5 15.5 16z"/>',
      compass:'<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
      book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
      lightbulb:'<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
      message:'<path d="M21 11.5a8.5 8.5 0 0 1-11.3 8L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/>',
      scale:'<path d="M12 3v18"/><path d="M5 7h14"/><path d="m5 7-3 6h6Z"/><path d="m19 7-3 6h6Z"/><path d="M7 21h10"/>',
      globe:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/>',
      heart:'<path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 5 5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.1 3 5.5l7 7Z"/>',
      mountain:'<path d="m8 3 4 8 5-5 5 15H2L8 3z"/>',
      activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
      reflect:'<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2m-15.7 5.7-1.4 1.4m14.2-14.2-1.4 1.4m0 11.4 1.4 1.4M4.9 4.9l1.4 1.4"/>',
      check:'<polyline points="20 6 9 17 4 12"/>',pencil:'<path d="M17 3a2.8 2.8 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
      users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/>',
      grid:'<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>',
      save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>'
    };

    function icon(name, size=18) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[name]||''}</svg>`;
    }
    function sv(color) { const[s,,a,d]=ramps[color]; return `--soft:${s};--accent:${a};--deep:${d}`; }
    function esc(t) { return String(t??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }

    let classroom = null;
    let currentTab = 'overview';
    let selectedProfileId = profiles[0].id;
    const allResponses = {};
    const classMeanings = {};

    function getGroups() {
      if (!classroom) return [];
      const gs = Math.ceil(classroom.student_count / classroom.group_count);
      return Array.from({length: classroom.group_count}, (_, i) => {
        const no = i + 1;
        const start = i * gs + 1;
        const end = Math.min(start + gs - 1, classroom.student_count);
        return { no, name: `${no}모둠 · ${groupNames[i]||no+'모둠'}`, seats: Array.from({length:end-start+1},(_,j)=>start+j) };
      });
    }

    function renderTabs() {
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
    }

    function renderOverview() {
      const total = classroom.student_count;
      const doneP = Object.values(allResponses).filter(r => Object.keys(r.personal_answers||{}).length > 0).length;
      const doneG = Object.values(allResponses).filter(r => r.group_submitted).length;
      const doneS = Object.values(allResponses).filter(r => Object.keys(r.self_scores||{}).length > 0).length;

      document.getElementById('main').innerHTML = `
        <div class="screen">
          <div class="stat-grid">
            <div class="stat-card"><span class="stat-num">${total}</span><span class="stat-label">전체 학생</span></div>
            <div class="stat-card"><span class="stat-num" style="color:#00bf40">${doneP}</span><span class="stat-label">개인 활동 참여</span></div>
            <div class="stat-card"><span class="stat-num" style="color:#0066ff">${doneG}</span><span class="stat-label">모둠 정의 제출</span></div>
            <div class="stat-card"><span class="stat-num" style="color:#cb59ff">${doneS}</span><span class="stat-label">자기 평가 완료</span></div>
          </div>
          <div class="panel">
            <div class="panel-bar">
              <span class="panel-title">${icon('grid')} 번호별 활동 현황</span>
            </div>
            <div class="legend">
              <div class="legend-item"><span class="legend-dot" style="background:#d9ffe6;border:1.5px solid #00bf40"></span>개인 활동</div>
              <div class="legend-item"><span class="legend-dot" style="background:#eaf2fe;border:1.5px solid #0066ff"></span>모둠 제출</div>
              <div class="legend-item"><span class="legend-dot" style="background:#f9edff;border:1.5px solid #cb59ff"></span>자기 평가</div>
              <div class="legend-item"><span class="legend-dot" style="background:linear-gradient(135deg,#d9ffe6,#eaf2fe);border:1.5px solid #0066ff"></span>전체 완료</div>
            </div>
            <div class="seat-grid">
              ${Array.from({length:total},(_,i)=>{
                const no = i+1;
                const r = allResponses[no];
                const hasP = r && Object.keys(r.personal_answers||{}).length > 0;
                const hasG = r && r.group_submitted;
                const hasS = r && Object.keys(r.self_scores||{}).length > 0;
                const cls = hasP&&hasG&&hasS?'done-all':hasG?'done-g':hasS?'done-s':hasP?'done-p':'';
                const statusText = hasP&&hasG&&hasS?'완료':hasG?'모둠':hasS?'평가':hasP?'개인':'대기';
                return `<div class="seat-cell ${cls}"><div>${no}번</div><small>${statusText}</small></div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    }

    function renderPersonal() {
      const p = profiles.find(item => item.id === selectedProfileId) || profiles[0];
      const entries = Object.entries(allResponses)
        .filter(([,r]) => r.personal_answers?.[selectedProfileId]?.trim())
        .map(([seat,r]) => ({ seat: +seat, text: r.personal_answers[selectedProfileId] }))
        .sort((a,b) => a.seat - b.seat);

      document.getElementById('main').innerHTML = `
        <div class="screen">
          <div class="section-head">
            <div>
              <span class="step-badge">1단계 · 개인 활동</span>
              <h1>학생별 개인 생각 모음</h1>
              <p class="desc">학습자상을 선택하면 해당 프로필에 대해 작성한 학생들의 생각을 볼 수 있습니다.</p>
            </div>
          </div>
          <div class="profile-grid" style="margin-bottom:28px">
            ${profiles.map(item => {
              const cnt = Object.values(allResponses).filter(r => r.personal_answers?.[item.id]?.trim()).length;
              return `<button class="profile-btn${item.id===selectedProfileId?' active-p':''}" style="${sv(item.color)}" data-pid="${item.id}">
                <span class="profile-icon">${icon(item.icon,18)}</span>
                <div><div class="profile-name">${esc(item.ko)}</div><div class="profile-count">${cnt}명 작성</div></div>
              </button>`;
            }).join('')}
          </div>
          <div class="panel">
            <div class="panel-bar">
              <span class="panel-title" style="${sv(p.color)};color:var(--deep)">${icon(p.icon)} ${esc(p.ko)} · ${entries.length}명 작성</span>
            </div>
            ${entries.length ? `<div class="answers-grid">${entries.map(e=>`
              <div class="answer-card">
                <div class="answer-seat">${e.seat}번</div>
                <div class="answer-text">${esc(e.text)}</div>
              </div>`).join('')}</div>` : `<p class="empty-text">아직 이 학습자상에 대해 작성한 학생이 없습니다.</p>`}
          </div>
        </div>`;
      document.querySelectorAll('[data-pid]').forEach(btn => {
        btn.addEventListener('click', () => { selectedProfileId = btn.dataset.pid; renderPersonal(); });
      });
    }

    function renderGroup() {
      const groups = getGroups();
      document.getElementById('main').innerHTML = `
        <div class="screen">
          <div class="section-head">
            <div>
              <span class="step-badge">2단계 · 모둠 활동</span>
              <h1>모둠별 정의 현황</h1>
              <p class="desc">각 모둠이 제출한 학습자상 정의를 확인합니다.</p>
            </div>
          </div>
          <div class="group-grid">
            ${groups.map(g => {
              const submitters = g.seats.filter(s => allResponses[s]?.group_submitted);
              const latest = submitters.length ? allResponses[g.seats.find(s => allResponses[s]?.group_submitted)] : null;
              const profileId = latest?.group_profile_id;
              const p = profileId ? profiles.find(item => item.id === profileId) : null;
              return `<div class="group-card">
                <div class="group-card-top" style="${p?sv(p.color):''}">
                  <div class="group-no" style="${p?`background:var(--accent)`:'background:rgba(112,115,124,.3)'}">${g.no}</div>
                  <div>
                    <div class="group-name" style="${p?'color:var(--deep)':''}">${esc(g.name)}</div>
                    <div class="group-members">${g.seats.map(s=>`${s}번`).join(', ')} · ${submitters.length}명 제출</div>
                  </div>
                </div>
                <div class="group-body">
                  ${latest ? `
                    <div style="font-size:11px;font-weight:750;color:var(--muted);margin-bottom:8px">${p?esc(p.ko):'학습자상'}</div>
                    <div class="group-def"><b>${p?esc(p.ko):'학습자상'}</b>은/는 ${esc(latest.group_def)}</div>` :
                    `<p class="empty-text">아직 제출된 정의가 없습니다.</p>`}
                  ${submitters.length > 1 ? `<div style="margin-top:12px;font-size:12px;color:var(--muted);font-weight:700">${submitters.length}명의 의견이 있습니다.</div>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function renderClass() {
      document.getElementById('main').innerHTML = `
        <div class="screen">
          <div class="section-head">
            <div>
              <span class="step-badge">반 전체 · 교사 관리</span>
              <h1>학급 학습자상 의미 관리</h1>
              <p class="desc">각 학습자상에 대한 우리 학급의 공식 의미를 작성하세요. 학생들의 자기 평가 화면에 표시됩니다.</p>
            </div>
          </div>
          <div class="meanings-grid" id="meanings-grid">
            ${profiles.map(p => {
              const current = classMeanings[p.id] || '';
              return `<div class="meaning-card" id="mc-${p.id}">
                <div class="meaning-top" style="${sv(p.color)}">
                  <span class="meaning-icon">${icon(p.icon,18)}</span>
                  <div>
                    <div style="font-size:11px;font-weight:750;color:var(--deep);text-transform:uppercase">${esc(p.en)}</div>
                    <div class="meaning-ko">${esc(p.ko)}</div>
                  </div>
                </div>
                <div class="meaning-body">
                  <textarea id="m-${p.id}" rows="3" placeholder="우리 학급만의 ${esc(p.ko)} 의미를 작성하세요...">${esc(current)}</textarea>
                  <div style="display:flex;justify-content:flex-end;margin-top:8px">
                    <button class="btn primary small" data-save="${p.id}">${icon('save',14)} 저장</button>
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;

      document.querySelectorAll('[data-save]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const profileId = btn.dataset.save;
          const text = document.getElementById(`m-${profileId}`).value.trim();
          btn.textContent = '저장 중...';
          btn.disabled = true;
          const { error } = await sb.from('class_meanings').upsert({
            classroom_id: classroomId, profile_id: profileId, meaning: text
          }, { onConflict: 'classroom_id,profile_id' });
          if (!error) {
            classMeanings[profileId] = text;
            btn.innerHTML = `${icon('check',14)} 저장됨`;
            setTimeout(() => { btn.innerHTML = `${icon('save',14)} 저장`; btn.disabled = false; }, 1500);
          } else {
            btn.textContent = '오류';
            btn.disabled = false;
          }
        });
      });
    }

    function render() {
      renderTabs();
      if (currentTab === 'overview') renderOverview();
      else if (currentTab === 'personal') renderPersonal();
      else if (currentTab === 'group') renderGroup();
      else if (currentTab === 'class') renderClass();
    }

    async function init() {
      if (!classroomId) {
        document.getElementById('main').innerHTML = `<div style="padding:80px 20px;text-align:center;color:var(--muted)">학급 링크가 올바르지 않습니다. <a href="index.html">처음으로</a></div>`;
        return;
      }
      const { data: cls, error } = await sb.from('classrooms').select('*').eq('id', classroomId).single();
      if (error || !cls) {
        document.getElementById('main').innerHTML = `<div style="padding:80px 20px;text-align:center;color:var(--muted)">학급을 찾을 수 없습니다.</div>`;
        return;
      }
      classroom = cls;
      document.getElementById('brand-mark').innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons.sparkles}</svg>`;
      document.getElementById('brand-title').textContent = cls.name;
      document.getElementById('brand-sub').textContent = `학생 ${cls.student_count}명 · ${cls.group_count}개 모둠`;
      document.title = cls.name + ' · 교사 대시보드';

      const [{ data: resps }, { data: meanings }] = await Promise.all([
        sb.from('student_responses').select('*').eq('classroom_id', classroomId),
        sb.from('class_meanings').select('*').eq('classroom_id', classroomId)
      ]);
      if (resps) resps.forEach(r => allResponses[r.seat_number] = r);
      if (meanings) meanings.forEach(m => classMeanings[m.profile_id] = m.meaning);

      sb.channel(`teacher:${classroomId}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'student_responses', filter: `classroom_id=eq.${classroomId}` }, payload => {
          if (payload.eventType === 'DELETE') delete allResponses[payload.old.seat_number];
          else allResponses[payload.new.seat_number] = payload.new;
          if (currentTab === 'overview') renderOverview();
          else if (currentTab === 'personal') renderPersonal();
          else if (currentTab === 'group') renderGroup();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'class_meanings', filter: `classroom_id=eq.${classroomId}` }, payload => {
          if (payload.new) classMeanings[payload.new.profile_id] = payload.new.meaning;
        })
        .subscribe();

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => { currentTab = btn.dataset.tab; render(); });
      });

      render();
    }

    init();
  </script>
</body>
</html>
